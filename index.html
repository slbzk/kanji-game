<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>句帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600&display=swap');

  :root {
    --ink: #1a1208;
    --ink-light: #3d2f1a;
    --ink-faint: #6b5340;
    --paper: #f5f0e8;
    --paper-dark: #ede7d8;
    --paper-shadow: #d8cfc0;
    --red: #b5271a;
    --gold: #c8a84b;
    --gold-light: #e8d08a;
    --submitted: #2a6b3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 和紙テクスチャ背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.03) 28px, rgba(0,0,0,0.03) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,0.02) 28px, rgba(0,0,0,0.02) 29px);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }

  /* ヘッダー */
  header {
    background: var(--ink);
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }

  .app-title {
    font-family: 'Shippori Mincho', serif;
    color: var(--gold);
    font-size: 22px;
    letter-spacing: 0.3em;
    writing-mode: horizontal-tb;
  }

  .app-title span {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 0.2em;
    display: block;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .btn-icon:hover {
    background: var(--gold);
    color: var(--ink);
  }

  /* フィルターバー */
  .filter-bar {
    background: var(--paper-dark);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--paper-shadow);
    align-items: center;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--paper-shadow);
    color: var(--ink-faint);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--gold);
  }

  /* 横スクロール巻物エリア */
  .scroll-hint {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    padding: 8px 16px 4px;
    background: var(--paper);
    text-align: right;
  }

  /* メインエリア：追加列＋スクロールエリア */
  .main-area {
    display: flex;
    flex-direction: row;
    height: calc(100vh - 200px);
    min-height: 300px;
    overflow: hidden;
  }

  /* 固定追加列（常に右端に表示） */
  .add-column {
    flex-shrink: 0;
    width: 56px;
    height: 100%;
    background: none;
    border: none;
    border-right: 2px dashed var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.2s;
    color: var(--gold);
    opacity: 0.7;
    order: 0; /* 右端 */
  }

  .add-column:hover {
    background: rgba(200,168,75,0.1);
    opacity: 1;
  }

  .add-column-label {
    writing-mode: vertical-rl;
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: inherit;
  }

  .haiku-scroll-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--paper-shadow) transparent;
  }

  .haiku-scroll-wrap::-webkit-scrollbar {
    height: 6px;
  }
  .haiku-scroll-wrap::-webkit-scrollbar-track {
    background: var(--paper-dark);
  }
  .haiku-scroll-wrap::-webkit-scrollbar-thumb {
    background: var(--paper-shadow);
    border-radius: 3px;
  }

  /* 巻物の内側：縦書きの列を横に並べる */
  .haiku-list {
    display: flex;
    flex-direction: row-reverse; /* 右から左へ：新しいものが左 */
    align-items: stretch;
    height: 100%;
    padding: 0;
    min-width: max-content;
    padding-right: 16px;
    padding-left: 40px;
  }

  /* 句カード：縦長の列 */
  .haiku-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90px;
    height: 100%;
    border-right: 1px solid var(--paper-shadow);
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .haiku-card:first-child {
    border-left: 1px solid var(--paper-shadow);
  }

  .haiku-card:hover {
    background: rgba(200,168,75,0.06);
  }

  .haiku-card.submitted {
    background: rgba(42,107,60,0.04);
  }

  .haiku-card.submitted::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--submitted);
  }

  /* 句本文（縦書き） */
  .haiku-vertical {
    writing-mode: vertical-rl;
    font-family: 'Shippori Mincho', serif;
    font-size: 19px;
    line-height: 1.9;
    letter-spacing: 0.18em;
    color: var(--ink);
    flex: 1;
    padding: 20px 10px 16px;
    word-break: break-all;
    overflow: hidden;
  }

  /* カード下部のメタ情報 */
  .card-bottom {
    width: 100%;
    padding: 8px 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    border-top: 1px solid var(--paper-shadow);
  }

  .meta-date {
    writing-mode: vertical-rl;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    line-height: 1.4;
  }

  .meta-destination {
    writing-mode: vertical-rl;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.05em;
    max-height: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .submitted-badge {
    font-size: 14px;
    color: var(--submitted);
    line-height: 1;
  }

  /* 右端：新規追加ボタン列 */
  .add-column {
    width: 56px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-right: 1px dashed var(--paper-shadow);
    cursor: pointer;
    transition: background 0.2s;
    color: var(--ink-faint);
    font-size: 28px;
    opacity: 0.5;
  }

  .add-column:hover {
    background: rgba(200,168,75,0.08);
    opacity: 1;
    color: var(--gold);
    border-color: var(--gold);
  }

  .add-column-label {
    writing-mode: vertical-rl;
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: inherit;
  }

  /* カードアクション（ホバー時オーバーレイ） */
  .card-actions {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .haiku-card:hover .card-actions {
    opacity: 1;
    pointer-events: all;
  }

  .btn-submit {
    background: var(--paper);
    border: 1px solid var(--paper-shadow);
    color: var(--ink-faint);
    padding: 3px 6px;
    font-family: 'Noto Serif JP', serif;
    font-size: 9px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .btn-submit:hover, .btn-submit.active {
    background: var(--submitted);
    border-color: var(--submitted);
    color: white;
  }

  .btn-edit-small {
    background: var(--paper);
    border: 1px solid var(--paper-shadow);
    color: var(--ink-faint);
    font-size: 12px;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 3px;
    line-height: 1;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .btn-edit-small:hover { color: var(--gold); border-color: var(--gold); }

  /* 空状態 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-width: 200px;
    padding: 40px;
    color: var(--ink-faint);
    cursor: pointer;
  }
  .empty-state:hover { background: rgba(200,168,75,0.04); }
  .empty-state .kana {
    writing-mode: vertical-rl;
    font-family: 'Shippori Mincho', serif;
    font-size: 48px;
    color: var(--paper-shadow);
    margin-bottom: 16px;
  }
  .empty-state p {
    writing-mode: vertical-rl;
    font-size: 12px;
    line-height: 1.8;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
  }

  /* 検索バー */
  .search-bar {
    background: var(--paper-dark);
    padding: 8px 12px;
    border-bottom: 1px solid var(--paper-shadow);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: white;
    border: 1px solid var(--paper-shadow);
    border-radius: 20px;
    padding: 5px 12px;
    gap: 6px;
    transition: border-color 0.2s;
  }

  .search-input-wrap:focus-within { border-color: var(--gold); }

  .search-icon { font-size: 13px; color: var(--ink-faint); flex-shrink: 0; }

  .search-input {
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
  }
  .search-input::placeholder { color: var(--paper-shadow); }

  .search-clear {
    background: none;
    border: none;
    color: var(--ink-faint);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
    display: none;
  }
  .search-clear.visible { display: block; }

  .search-count {
    font-size: 11px;
    color: var(--ink-faint);
    white-space: nowrap;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* 投句先タブバー */
  .dest-tab-bar {
    background: var(--ink);
    padding: 0 4px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 2px solid var(--gold);
  }
  .dest-tab-bar::-webkit-scrollbar { display: none; }

  .dest-tab {
    flex-shrink: 0;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    color: rgba(200,168,75,0.5);
    padding: 7px 12px;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.08em;
  }
  .dest-tab:hover { color: var(--gold-light); }
  .dest-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* 検索ヒット強調 */
  mark {
    background: rgba(200,168,75,0.4);
    color: var(--ink);
    border-radius: 2px;
  }
  .fab {
    display: none;
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,14,8,0.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--paper);
    width: 100%;
    max-width: 480px;
    border-radius: 16px 16px 0 0;
    padding: 24px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--paper-shadow);
  }

  .modal-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.2em;
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--ink-faint);
    cursor: pointer;
    line-height: 1;
  }

  /* 縦書き入力エリア */
  .vertical-input-wrap {
    background: white;
    border: 1px solid var(--paper-shadow);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .vertical-input-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent calc(100% / 3 - 1px),
      var(--paper) calc(100% / 3 - 1px),
      var(--paper) calc(100% / 3)
    );
    pointer-events: none;
    opacity: 0.5;
  }

  .haiku-textarea {
    writing-mode: vertical-rl;
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    line-height: 2;
    letter-spacing: 0.2em;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
    min-height: 120px;
    width: 100%;
    resize: none;
    text-align: start;
  }

  .haiku-textarea::placeholder {
    color: var(--paper-shadow);
  }

  .form-field {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    background: white;
    border: 1px solid var(--paper-shadow);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus {
    border-color: var(--gold);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-primary {
    width: 100%;
    background: var(--ink);
    border: none;
    color: var(--gold);
    padding: 14px;
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    letter-spacing: 0.3em;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-primary:hover {
    background: var(--ink-light);
  }

  .btn-danger {
    width: 100%;
    background: none;
    border: 1px solid #c0392b;
    color: #c0392b;
    padding: 10px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-danger:hover {
    background: #c0392b;
    color: white;
  }

  /* 縦書きビュー */
  .view-modal .modal {
    background: var(--ink);
  }

  .view-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .view-haiku {
    writing-mode: vertical-rl;
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    line-height: 2.5;
    letter-spacing: 0.3em;
    color: var(--paper);
    margin-bottom: 24px;
  }

  .view-meta {
    color: var(--gold-light);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--gold);
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 13px;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
    border: 1px solid var(--gold);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 空状態 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-width: 200px;
    padding: 40px;
    color: var(--ink-faint);
    cursor: pointer;
  }

  .empty-state:hover { background: rgba(200,168,75,0.04); }

  .empty-state .kana {
    writing-mode: vertical-rl;
    font-family: 'Shippori Mincho', serif;
    font-size: 48px;
    color: var(--paper-shadow);
    margin-bottom: 16px;
  }

  .empty-state p {
    writing-mode: vertical-rl;
    font-size: 12px;
    line-height: 1.8;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
  }

  /* ストレージ表示 */
  .storage-info {
    padding: 8px 16px;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--paper-shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .storage-text {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  .btn-import, .btn-export {
    background: none;
    border: 1px solid var(--paper-shadow);
    color: var(--ink-faint);
    padding: 3px 10px;
    font-size: 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .btn-import:hover, .btn-export:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .storage-btns { display: flex; gap: 6px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="app-title">
      句帳
      <span>HAIKU NOTEBOOK</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btnSort" title="並び替え">⇅</button>
    </div>
  </header>

  <div class="storage-info">
    <span class="storage-text" id="storageText">句数：読み込み中...</span>
    <div class="storage-btns">
      <button class="btn-import" onclick="importData()">📥 読込</button>
      <button class="btn-export" onclick="exportData()">📤 保存</button>
    </div>
  </div>

  <!-- 検索バー -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="句・投句先・備考を検索...">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <span class="search-count" id="searchCount"></span>
  </div>

  <!-- 投句先タブバー -->
  <div class="dest-tab-bar" id="destTabBar">
    <button class="dest-tab active" data-dest="all">すべて</button>
  </div>

  <!-- 投句済フィルター -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="submitted">投句済</button>
    <button class="filter-btn" data-filter="pending">未投句</button>
  </div>

  <div class="scroll-hint">← スワイプして閲覧</div>

  <div class="main-area">
    <button class="add-column" id="addColumnFixed">
      <span style="font-size:22px">＋</span>
      <span class="add-column-label">新しい句</span>
    </button>
    <div class="haiku-scroll-wrap" id="scrollWrap">
      <div class="haiku-list" id="haikuList"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabAdd" title="新規追加">＋</button>

<!-- 句入力/編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">新しい句</span>
      <button class="btn-close" id="btnCloseModal">✕</button>
    </div>

    <div class="vertical-input-wrap">
      <textarea class="haiku-textarea" id="haikuInput" placeholder="古池や　蛙飛び込む　水の音" rows="3"></textarea>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">日付</label>
        <input type="date" class="form-input" id="haikuDate">
      </div>
      <div class="form-field">
        <label class="form-label">投句先</label>
        <input type="text" class="form-input" id="haikuDestination" placeholder="〇〇句会" list="destList" autocomplete="off">
        <datalist id="destList"></datalist>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">備考</label>
      <input type="text" class="form-input" id="haikuNote" placeholder="季語・メモなど">
    </div>

    <button class="btn-primary" id="btnSave">保　存</button>
    <button class="btn-danger" id="btnDelete" style="display:none">この句を削除する</button>
  </div>
</div>

<!-- 縦書きビューモーダル -->
<div class="modal-overlay view-modal" id="viewModal">
  <div class="modal" style="background:var(--ink)">
    <div class="modal-header" style="border-color:#333">
      <span class="modal-title" style="color:var(--gold)">句　閲覧</span>
      <button class="btn-close" id="btnCloseView" style="color:var(--gold-light)">✕</button>
    </div>
    <div class="view-content">
      <div class="view-haiku" id="viewHaiku"></div>
      <div class="view-meta" id="viewMeta"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary" id="viewSubmitBtn" style="margin-top:0">投句済にする</button>
      <button style="flex:0 0 50px;background:none;border:1px solid var(--gold);color:var(--gold);border-radius:8px;font-family:'Noto Serif JP',serif;font-size:13px;cursor:pointer" id="viewEditBtn">編集</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
const STORAGE_KEY = 'haiku_notebook_v1';
let haikus = [];
let editingId = null;
let currentFilter = 'all';
let currentDest = 'all';
let searchQuery = '';
let viewingId = null;
let sortAsc = false;

// --- ストレージ ---
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(haikus));
    updateStorageText();
  } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    haikus = d ? JSON.parse(d) : [];
  } catch(e) { haikus = []; }
  updateStorageText();
  render();
}

function updateStorageText() {
  const submitted = haikus.filter(h => h.submitted).length;
  document.getElementById('storageText').textContent =
    `句数：${haikus.length}句　（投句済：${submitted}句）`;
}

// --- エクスポート/インポート ---
function exportData() {
  const blob = new Blob([JSON.stringify(haikus, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `句帳_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('句帳をファイルに保存しました');
}

function importData() {
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        if (confirm(`${data.length}句を読み込みます。現在のデータと統合しますか？`)) {
          // IDの重複を避けてマージ
          const existingIds = new Set(haikus.map(h => h.id));
          const newItems = data.filter(h => !existingIds.has(h.id));
          haikus = [...haikus, ...newItems];
          save();
          render();
          showToast(`${newItems.length}句を追加しました`);
        }
      }
    } catch(e) { showToast('読み込みに失敗しました'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// --- 投句先タブ更新 ---
function updateDestTabs() {
  const dests = [...new Set(haikus.map(h => h.destination).filter(Boolean))].sort();
  const bar = document.getElementById('destTabBar');
  bar.innerHTML = `<button class="dest-tab ${currentDest==='all'?'active':''}" data-dest="all">すべて</button>`
    + dests.map(d => `<button class="dest-tab ${currentDest===d?'active':''}" data-dest="${escHtml(d)}">${escHtml(d)}</button>`).join('');

  // datalistも更新
  document.getElementById('destList').innerHTML =
    dests.map(d => `<option value="${escHtml(d)}">`).join('');
}

// --- ハイライト ---
function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

// --- 描画 ---
function render() {
  updateDestTabs();
  const list = document.getElementById('haikuList');
  let filtered = [...haikus];

  // 投句先タブ
  if (currentDest !== 'all') filtered = filtered.filter(h => h.destination === currentDest);

  // 投句済フィルター
  if (currentFilter === 'submitted') filtered = filtered.filter(h => h.submitted);
  if (currentFilter === 'pending')   filtered = filtered.filter(h => !h.submitted);

  // 検索
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(h =>
      (h.text && h.text.toLowerCase().includes(q)) ||
      (h.destination && h.destination.toLowerCase().includes(q)) ||
      (h.note && h.note.toLowerCase().includes(q))
    );
  }

  // 件数表示
  const countEl = document.getElementById('searchCount');
  countEl.textContent = searchQuery || currentDest !== 'all' ? `${filtered.length}句` : '';

  // ソート（新しい句が左端）
  filtered.sort((a, b) => sortAsc ? (b.createdAt - a.createdAt) : (a.createdAt - b.createdAt));

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state" id="emptyAdd">
        <span class="kana">${searchQuery ? '無' : '句'}</span>
        <p>${searchQuery ? '該当なし' : '句を追加する'}</p>
      </div>`;
    if (!searchQuery) document.getElementById('emptyAdd').addEventListener('click', openAdd);
    return;
  }

  const cards = filtered.map(h => `
    <div class="haiku-card ${h.submitted ? 'submitted' : ''}" data-id="${h.id}">
      <div class="haiku-vertical" data-view="${h.id}">${highlight(h.text, searchQuery)}</div>
      <div class="card-bottom">
        ${h.submitted ? `<div class="submitted-badge">✓</div>` : ''}
        ${h.destination ? `<div class="meta-destination">${highlight(h.destination, searchQuery)}</div>` : ''}
        <div class="meta-date">${formatDateShort(h.date)}</div>
      </div>
      <div class="card-actions">
        <button class="btn-submit ${h.submitted ? 'active' : ''}" data-submit="${h.id}">
          ${h.submitted ? '投句済' : '投句'}
        </button>
        <button class="btn-edit-small" data-edit="${h.id}">✎ 編集</button>
      </div>
    </div>
  `).join('');

  list.innerHTML = cards;

  list.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', () => openView(el.dataset.view));
  });
  list.querySelectorAll('[data-submit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); toggleSubmit(el.dataset.submit); });
  });
  list.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openEdit(el.dataset.edit); });
  });

  if (window._scrollToNew) {
    document.getElementById('scrollWrap').scrollLeft = 0;
    window._scrollToNew = false;
  }
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- 句操作 ---
function toggleSubmit(id) {
  const h = haikus.find(h => h.id === id);
  if (!h) return;
  h.submitted = !h.submitted;
  save();
  render();
  showToast(h.submitted ? '投句済にしました' : '未投句に戻しました');
}

// --- モーダル ---
function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新しい句';
  document.getElementById('haikuInput').value = '';
  document.getElementById('haikuDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('haikuDestination').value = '';
  document.getElementById('haikuNote').value = '';
  document.getElementById('btnDelete').style.display = 'none';
  openModal('editModal');
  setTimeout(() => document.getElementById('haikuInput').focus(), 400);
}

function openEdit(id) {
  const h = haikus.find(h => h.id === id);
  if (!h) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '句を編集';
  document.getElementById('haikuInput').value = h.text;
  document.getElementById('haikuDate').value = h.date || '';
  document.getElementById('haikuDestination').value = h.destination || '';
  document.getElementById('haikuNote').value = h.note || '';
  document.getElementById('btnDelete').style.display = 'block';
  closeModal('viewModal');
  openModal('editModal');
  setTimeout(() => document.getElementById('haikuInput').focus(), 400);
}

function openView(id) {
  const h = haikus.find(h => h.id === id);
  if (!h) return;
  viewingId = id;
  document.getElementById('viewHaiku').textContent = h.text;
  let meta = formatDate(h.date);
  if (h.destination) meta += `　投句先：${h.destination}`;
  if (h.submitted) meta += `　✓ 投句済`;
  document.getElementById('viewMeta').textContent = meta;

  const btn = document.getElementById('viewSubmitBtn');
  btn.textContent = h.submitted ? '未投句に戻す' : '投句済にする';
  btn.style.background = h.submitted ? '#666' : 'var(--ink)';

  openModal('viewModal');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveHaiku() {
  const text = document.getElementById('haikuInput').value.trim();
  if (!text) { showToast('句を入力してください'); return; }

  if (editingId) {
    const h = haikus.find(h => h.id === editingId);
    if (h) {
      h.text = text;
      h.date = document.getElementById('haikuDate').value;
      h.destination = document.getElementById('haikuDestination').value.trim();
      h.note = document.getElementById('haikuNote').value.trim();
      h.updatedAt = Date.now();
    }
    showToast('句を更新しました');
  } else {
    haikus.push({
      id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      text,
      date: document.getElementById('haikuDate').value,
      destination: document.getElementById('haikuDestination').value.trim(),
      note: document.getElementById('haikuNote').value.trim(),
      submitted: false,
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
    window._scrollToNew = true;
    showToast('句を追加しました');
  }

  save();
  render();
  closeModal('editModal');
}

function deleteHaiku() {
  if (!editingId) return;
  if (!confirm('この句を削除しますか？')) return;
  haikus = haikus.filter(h => h.id !== editingId);
  save();
  render();
  closeModal('editModal');
  showToast('句を削除しました');
}

// --- トースト ---
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// --- イベント ---
document.getElementById('fabAdd').addEventListener('click', openAdd);
document.getElementById('btnCloseModal').addEventListener('click', () => closeModal('editModal'));
document.getElementById('btnSave').addEventListener('click', saveHaiku);
document.getElementById('btnDelete').addEventListener('click', deleteHaiku);
document.getElementById('btnCloseView').addEventListener('click', () => closeModal('viewModal'));

document.getElementById('viewSubmitBtn').addEventListener('click', () => {
  if (!viewingId) return;
  toggleSubmit(viewingId);
  // ボタン更新
  const h = haikus.find(h => h.id === viewingId);
  if (h) {
    const btn = document.getElementById('viewSubmitBtn');
    btn.textContent = h.submitted ? '未投句に戻す' : '投句済にする';
    btn.style.background = h.submitted ? '#666' : 'var(--ink)';
    let meta = formatDate(h.date);
    if (h.destination) meta += `　投句先：${h.destination}`;
    if (h.submitted) meta += `　✓ 投句済`;
    document.getElementById('viewMeta').textContent = meta;
  }
});

document.getElementById('viewEditBtn').addEventListener('click', () => {
  if (viewingId) openEdit(viewingId);
});

// オーバーレイクリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

// 検索
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
  render();
});
document.getElementById('searchClear').addEventListener('click', () => {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
});

// 投句先タブ
document.getElementById('destTabBar').addEventListener('click', e => {
  const tab = e.target.closest('.dest-tab');
  if (!tab) return;
  currentDest = tab.dataset.dest;
  render();
});

// フィルター
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

// ソート
document.getElementById('btnSort').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('btnSort').title = sortAsc ? '古い順' : '新しい順';
  render();
});

// Enterキーで保存
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('editModal');
    closeModal('viewModal');
  }
});

// 起動
load();
document.getElementById('addColumnFixed').addEventListener('click', openAdd);
</script>
</body>
</html>
